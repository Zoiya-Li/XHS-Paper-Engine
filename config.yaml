# XHS Paper Engine Configuration File
# Modify this file to adjust various parameters without changing code

# ============================================================
# Research Domain Configuration (Most Commonly Modified)
# ============================================================
research:
  # Search keywords (Agent will use these to search for papers)
  keywords:
    - "Multi-Agent System Memory"

  # arXiv categories (can specify multiple to filter search results)
  # Common categories:
  #   - cs.AI  Artificial Intelligence
  #   - cs.CL  Computational Linguistics (NLP)
  #   - cs.LG  Machine Learning
  #   - cs.CV  Computer Vision
  #   - cs.IR  Information Retrieval
  #   - cs.NE  Neural and Evolutionary Computing
  #   - stat.ML Statistical Machine Learning
  categories:
    - "cs.AI"
    - "cs.CL"
    - "cs.LG"

  # Data sources (ordered by priority)
  # Options: arxiv, semantic
  # - semantic: requires S2_API_KEY
  sources:
    - "arxiv"
    # - "semantic"   # only enable when S2_API_KEY is provided

  # Number of days to search for papers
  days: 3

# ============================================================
# API Configuration
# ============================================================
api:
  # LLM provider — any OpenAI-compatible supplier. Set the matching API key in .env.
  # Chinese suppliers:
  #   siliconflow  硅基流动        -> SILICONFLOW_API_KEY
  #   deepseek     DeepSeek 深度求索 -> DEEPSEEK_API_KEY
  #   dashscope    阿里云百炼/通义   -> DASHSCOPE_API_KEY
  #   moonshot     月之暗面 Kimi     -> MOONSHOT_API_KEY
  #   zhipu        智谱 GLM          -> ZHIPU_API_KEY
  #   ark          火山方舟/豆包     -> ARK_API_KEY
  #   hunyuan      腾讯混元          -> HUNYUAN_API_KEY
  # International:
  #   openrouter   OpenRouter        -> OPENROUTER_API_KEY
  #   custom       any OpenAI-compatible endpoint -> CUSTOM_API_KEY (set api.custom.base_url below)
  # NOTE: switching provider also means setting a model name that provider serves
  # (see llm.text.model / llm.vision.model below).
  provider: "siliconflow"

  # Optional global defaults (per-provider overrides take precedence)
  default_timeout: 120
  default_max_retries: 3

  # Per-provider overrides are optional; base URLs are built in. Examples:
  # siliconflow:
  #   timeout: 120
  #   base_url: "https://api.siliconflow.cn/v1"
  # custom:
  #   base_url: "https://your-endpoint.example.com/v1"

# ============================================================
# LLM Parameters (SiliconFlow - DeepSeek models)
# ============================================================
llm:
  # Unified text-to-text model (chat/selection/xiaohongshu)
  text:
    model: "deepseek-ai/DeepSeek-V3"
    temperature: 0.7
    max_tokens: 3000

  # Vision-language model (image analysis/optimization)
  vision:
    model: "Qwen/Qwen3-VL-235B-A22B-Instruct"

# ============================================================
# Paper Search Parameters
# ============================================================
search:
  max_results: 50         # Default max results per search (when not overridden)
  min_citations: 0        # Minimum citation count (0=no limit, Semantic Scholar only)

# ============================================================
# Publishing Parameters
# ============================================================
publish:
  xiaohongshu:
    # ⚠️ Automated publishing to Xiaohongshu likely violates its Terms of Service
    # and may get your account banned. You must explicitly opt in by setting this to
    # true. When false (default), the pipeline stops after generating the draft.
    enabled: false                 # Master switch for automated publishing (opt-in)
    save_as_draft: false           # Save as draft (true=draft, false=publish directly)
    visibility: private            # Visibility: public=public, private=only me
    max_content_len: 1000          # Content length limit (Xiaohongshu UI shows 1000 chars)

# ============================================================
# Figure/Table Extraction (pdffigures2)
# ============================================================
extraction:
  dpi: 200                # Render DPI for extracted figure/table images
  pdffigures2_jar: ""     # Optional path override. If empty, uses env PDFFIGURES2_JAR
                          # or the default ~/.xhs-paper-engine/pdffigures2.jar

# ============================================================
# Retry Mechanism Parameters
# ============================================================
retry:
  base_delay: 2.0         # Base delay time (seconds)
  max_delay: 60.0         # Maximum delay time (seconds)
  backoff_factor: 2.0     # Backoff factor (exponential growth)
